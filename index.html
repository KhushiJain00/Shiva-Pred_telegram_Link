<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE SCOREBOARD | Join Now</title>
    <style>
        :root {
            --pitch-green: #0f2e1a;
            --grass-neon: #39FF14;
            --gold: #FFD700;
            --white: #ffffff;
            --dark-panel: rgba(0, 0, 0, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1d4d2b 0%, #050f08 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--white);
        }

        .scoreboard-container {
            width: 90%;
            max-width: 380px;
            perspective: 1000px;
        }

        .main-card {
            background: var(--dark-panel);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        /* Header / Live Badge */
        .card-header {
            background: #cc0000;
            padding: 5px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: pulse 1s infinite;
            display: inline-block;
            margin-right: 5px;
        }

        /* Match Content */
        .match-info {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, transparent, rgba(57, 255, 20, 0.05));
        }

        .vs-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
        }

        .team { font-weight: 900; font-size: 1.2rem; }
        .vs-badge { 
            background: var(--gold); 
            color: black; 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 0.7rem; 
        }

        /* Probability Section */
        .win-prob-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .prob-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 8px;
            color: #aaa;
        }

        .prob-bar-bg {
            height: 12px;
            background: #333;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
        }

        .prob-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--grass-neon), #00ffcc);
            width: 97%; /* THE 97% ACCURACY */
            box-shadow: 0 0 10px var(--grass-neon);
        }

        .percentage-text {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--grass-neon);
            margin: 10px 0;
        }

        /* Call to Action */
        .join-btn {
            display: block;
            background: var(--gold);
            color: #000;
            text-decoration: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .join-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
            background: #fff;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="scoreboard-container">
        <div class="main-card">
            <div class="card-header">
                <span><span class="live-dot"></span>LIVE PREDICTION</span>
                <span>IPL 2026</span>
            </div>

            <div class="match-info">
                <div class="vs-row">
                    <div class="team">IND</div>
                    <div class="vs-badge">VS</div>
                    <div class="team">AUS</div>
                </div>

                <div class="win-prob-box">
                    <div class="prob-header">
                        <span>WIN PROBABILITY</span>
                        <span>ACCURACY: 97%</span>
                    </div>
                    <div class="prob-bar-bg">
                        <div class="prob-fill"></div>
                    </div>
                    <div class="percentage-text">97.4% WIN RATE</div>
                    <p style="font-size: 0.75rem; color: #888;">Based on real-time pitch report & AI analysis</p>
                </div>

                <a href="https://t.me/+J1TE-42NroAxMGY9" class="join-btn">
                    Get Free Jackpot Team
                </a>

                <p style="margin-top: 15px; font-size: 0.7rem; color: #4ade80;">✓ 14,500+ Members Joined Today</p>
            </div>
        </div>
    </div>

</body>
</html>
