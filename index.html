<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Channel</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; text-align: center; padding: 50px 20px; }
