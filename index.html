<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRICKET HUB | Join Now</title>
    <style>
        :root {
            --pitch-green: #1d4d2b;
            --grass-light: #2d6a3e;
            --gold: #ffcc00;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', sans-serif;
            background: linear-gradient(135deg, var(--pitch-green) 0%, #0a210f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--white);
        }

        .stadium-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--grass-light);
            border-radius: 20px;
            padding: 40px 20px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* Cricket Pitch Pattern */
        .stadium-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 100%;
            background: rgba(255, 255, 255, 0.03);
            z-index: 0;
        }

        .content { position: relative; z-index: 1; }

        .icon-circle {
            width: 70px;
            height: 70px;
            background: var(--gold);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            box-shadow: 0 0 15px var(--gold);
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tagline {
            color: var(--gold);
            font-size: 0.8rem;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .join-btn {
            display: block;
            background: var(--white);
            color: var(--pitch-green);
            text-decoration: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .join-btn:hover {
            background: transparent;
            color: var(--white);
            border-color: var(--gold);
            transform: scale(1.05);
        }

        .live-indicator {
            margin-top: 25px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .red-dot {
            width: 8px;
            height: 8px;
            background: #ff0000;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="stadium-card">
        <div class="content">
            <div class="icon-circle">🏏</div>
            <h1>CRICKET PREDICTOR</h1>
            <p class="tagline">LIVE UPDATES • NEWS • STATS</p>
            
            <a href="https://t.me/+J1TE-42NroAxMGY9" class="join-btn">Join Telegram</a>

            <div class="live-indicator">
                <div class="red-dot"></div>
                LIVE ANALYSIS ONGOING
            </div>
        </div>
    </div>

</body>
</html>
